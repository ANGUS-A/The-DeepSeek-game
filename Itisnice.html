<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>星願扭蛋機 · 收藏幻想</title>
    <!-- Google Font (可選) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Three.js 核心庫 & 互動輔助 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Quicksand', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1a1e2c 0%, #2b3042 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        #app {
            max-width: 500px;
            width: 100%;
            background: rgba(30, 35, 50, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,215,150,0.15);
            padding: 20px 16px 30px;
            position: relative;
            transition: all 0.2s;
        }
        /* 頂部欄位 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px 12px 4px;
            color: #f0e8d9;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .profile-area {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.06);
            padding: 6px 14px 6px 10px;
            border-radius: 60px;
            border: 1px solid rgba(255,215,150,0.2);
            cursor: pointer;
            transition: 0.2s;
        }
        .profile-area:hover {
            background: rgba(255, 215, 150, 0.15);
        }
        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #d4b68a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #1e1e2a;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .nickname {
            font-size: 14px;
            max-width: 80px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .star-badge {
            background: rgba(255, 215, 0, 0.2);
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 18px;
            border: 1px solid #ffd966;
            color: #ffd966;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 12px rgba(255,215,0,0.2);
        }
        .star-badge:hover {
            background: rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 20px #ffd96655;
        }
        .star-badge span {
            font-size: 14px;
            font-weight: 600;
        }

        /* 主畫面 */
        .main-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 6px;
        }
        .machine-wrapper {
            width: 100%;
            background: radial-gradient(circle at 30% 30%, #3f3f5a, #1f2233);
            border-radius: 120px 120px 60px 60px;
            padding: 20px 20px 30px;
            box-shadow: inset 0 -8px 0 #0b0d14, 0 16px 30px #00000077;
            border: 1px solid #675d4e;
            position: relative;
        }
        .machine-body {
            background: #2f354a;
            border-radius: 80px 80px 40px 40px;
            padding: 18px 10px 10px;
            box-shadow: inset 0 4px 12px #5f5f7a, inset 0 -4px 8px #0b0d14;
        }
        .gacha-display {
            background: #161a27;
            border-radius: 40px;
            padding: 20px 8px;
            min-height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #534b3e;
            box-shadow: inset 0 0 30px #00000099;
            transition: 0.3s;
            position: relative;
        }
        .gacha-result {
            color: #f5e9d8;
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            line-height: 1.4;
            padding: 8px;
            width: 100%;
        }
        .gacha-result .star5 {
            color: #ffd966;
            text-shadow: 0 0 20px #ffb347, 0 0 40px #ff8800;
            animation: goldenGlow 1.2s infinite alternate;
        }
        @keyframes goldenGlow {
            0% { text-shadow: 0 0 10px #ffb347, 0 0 20px #ff8800; }
            100% { text-shadow: 0 0 30px #ffd966, 0 0 60px #ffaa33, 0 0 90px #ff6600; }
        }
        .gacha-3d-container {
            width: 100%;
            height: 160px;
            border-radius: 30px;
            overflow: hidden;
            background: #121624;
        }

        /* 按鈕列 */
        .action-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 18px;
        }
        .btn {
            background: #424a60;
            border: none;
            color: #f0ecde;
            font-weight: 700;
            font-size: 15px;
            padding: 10px 18px;
            border-radius: 60px;
            box-shadow: 0 6px 0 #1d212f, 0 8px 16px #00000055;
            cursor: pointer;
            transition: 0.07s linear;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex: 1 0 auto;
            justify-content: center;
            border: 1px solid #6d7a94;
        }
        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #1d212f;
        }
        .btn-gold {
            background: #c99f3c;
            border-color: #f5d06a;
            color: #1a1509;
            box-shadow: 0 6px 0 #7a601f;
        }
        .btn-coin {
            background: #4b6b5a;
            border-color: #7da58a;
        }

        /* 收藏品介面 (隱藏) */
        .collection-view {
            display: none;
            flex-direction: column;
            width: 100%;
        }
        .collection-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 4px 16px;
        }
        .back-btn {
            background: #3d435b;
            border: none;
            color: #f0e8d9;
            font-size: 24px;
            padding: 0 14px;
            border-radius: 40px;
            line-height: 44px;
            box-shadow: 0 4px 0 #1c1f2b;
            cursor: pointer;
            font-weight: 700;
        }
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-height: 420px;
            overflow-y: auto;
            padding: 8px 4px 20px;
            background: rgba(0,0,0,0.25);
            border-radius: 28px;
            scrollbar-width: thin;
            scrollbar-color: #b89b6b #2a2e3f;
        }
        .collection-grid::-webkit-scrollbar {
            width: 6px;
        }
        .collection-grid::-webkit-scrollbar-thumb {
            background: #b89b6b;
            border-radius: 10px;
        }
        .collect-item {
            background: #242937;
            border-radius: 16px;
            aspect-ratio: 1/1.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #cfc6b2;
            border: 1px solid #3b4157;
            box-shadow: inset 0 0 0 1px #10131e;
            padding: 4px;
            text-align: center;
            transition: 0.1s;
            position: relative;
        }
        .collect-item .rarity-star {
            font-size: 10px;
            margin-bottom: 2px;
        }
        .collect-item .item-name {
            font-size: 11px;
            font-weight: 600;
            line-height: 1.2;
        }
        .collect-item .duplicate-badge {
            background: #4d4f6b;
            border-radius: 30px;
            font-size: 10px;
            padding: 0 8px;
            margin-top: 4px;
            color: #eae2d0;
        }
        .collect-item.unknown {
            background: #1a1e2b;
            color: #6b6f88;
            border: 1px dashed #47506b;
        }
        .collect-item .item-3d-preview {
            width: 100%;
            height: 60px;
            background: #0e121e;
            border-radius: 10px;
            margin-bottom: 4px;
        }

        /* 底部點擊機 */
        .clicker-area {
            margin-top: 20px;
            background: #2c3145;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px 8px 20px;
            border: 1px solid #5e667e;
        }
        .clicker-btn {
            background: #f5c542;
            border: none;
            border-radius: 40px;
            padding: 10px 28px;
            font-weight: 700;
            font-size: 18px;
            color: #1f1b0e;
            box-shadow: 0 5px 0 #8f6f1f;
            cursor: pointer;
            transition: 0.05s linear;
        }
        .clicker-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 #8f6f1f;
        }
        .coin-display {
            color: #f5e7ca;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 登入浮層 */
        .login-overlay {
            position: fixed;
            top:0;left:0;width:100%;height:100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .login-card {
            background: #2f354a;
            padding: 32px 28px;
            border-radius: 60px;
            max-width: 340px;
            width: 90%;
            color: #f0e8d9;
            text-align: center;
            border: 1px solid #b89b6b;
            box-shadow: 0 30px 50px #000000aa;
        }
        .login-card button {
            background: #d4b68a;
            border: none;
            border-radius: 60px;
            padding: 12px 24px;
            font-weight: 700;
            font-size: 18px;
            color: #151a22;
            width: 100%;
            margin-top: 18px;
            cursor: pointer;
            transition: 0.1s;
        }
        .login-card input {
            background: #1e2332;
            border: 1px solid #5a627c;
            padding: 12px 16px;
            border-radius: 40px;
            width: 100%;
            color: #f0e8d9;
            font-size: 16px;
            margin-top: 12px;
        }
        .login-card .hint {
            font-size: 14px;
            opacity: 0.7;
            margin: 10px 0;
        }
        .hidden { display: none; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
    </style>
</head>
<body>
<div id="app">
    <!-- 登入 overlay -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <div style="font-size: 48px; margin-bottom: 6px;">🎰</div>
            <h2 style="margin:6px 0">星願扭蛋</h2>
            <p style="opacity:0.8; font-size:14px;">登入以保存收藏</p>
            <button id="googleLoginBtn">🔑 使用 Google 登入</button>
            <div style="margin:12px 0 4px; font-size:14px;">或</div>
            <input type="text" id="nicknameInput" placeholder="輸入暱稱" value="冒險者">
            <button id="guestLoginBtn">🎮 以訪客身份進入</button>
            <div class="hint">登入後可更改暱稱</div>
        </div>
    </div>

    <!-- 主頁 -->
    <div id="mainApp">
        <div class="top-bar">
            <div class="profile-area" id="profileArea">
                <div class="avatar" id="avatarDisplay">⭐</div>
                <span class="nickname" id="nicknameDisplay">冒險者</span>
            </div>
            <div class="star-badge" id="collectionToggle">
                ⭐ <span>收藏</span>
            </div>
        </div>

        <!-- 主畫面 (扭蛋機) -->
        <div id="mainView" class="main-view">
            <div class="machine-wrapper">
                <div class="machine-body">
                    <div class="gacha-display" id="gachaDisplay">
                        <div id="gachaResult" class="gacha-result">✨ 點擊扭蛋 ✨</div>
                        <div id="gacha3DContainer" class="gacha-3d-container hidden"></div>
                    </div>
                </div>
            </div>
            <div class="action-row">
                <button class="btn" id="gacha1Btn">🎲 扭1次</button>
                <button class="btn btn-gold" id="gacha10Btn">🎲 扭10次</button>
                <button class="btn btn-gold" id="gacha100Btn">🎲 扭100次</button>
            </div>
            <div class="clicker-area">
                <span class="coin-display">🪙 <span id="coinCount">10</span></span>
                <button class="clicker-btn" id="clickerBtn">⛏️ +1</button>
            </div>
            <div style="margin-top: 12px; font-size:14px; color:#b9b3a2; text-align:center;">點擊機器賺錢・蒐集所有星級！</div>
        </div>

        <!-- 收藏品介面 -->
        <div id="collectionView" class="collection-view">
            <div class="collection-header">
                <button class="back-btn" id="backToMain">←</button>
                <span style="font-size:20px; font-weight:600; color:#f0e8d9;">📦 收藏品</span>
                <span style="margin-left:auto; color:#d4b68a; font-size:14px;" id="collectionCount"></span>
            </div>
            <div id="collectionGrid" class="collection-grid"></div>
        </div>
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ---------- 遊戲狀態 ----------
    const state = {
        loggedIn: false,
        uid: 'guest_' + Date.now(),
        nickname: '冒險者',
        coins: 10,
        inventory: [],      // 物品名稱列表 (可重複)
        collection: {},     // { itemName: count }
        // 預設所有物品名稱 (用於顯示未知)
        allItems: [],
        // 星級對應
        starMap: {},
        // 3D 物件暫存
        threeObjects: {},
    };

    // ---------- 物品資料 ----------
    const itemDB = {
        '5star': [
            "傳說之劍","永恆王冠","龍神之戒","暗影斗篷","星辰法杖","不死鳥之羽","時空懷錶","創世之盾","虛空之眼","命運骰子",
            "神聖聖杯","雷神之鎚","冰霜之心","地獄火契約","天使豎琴","賢者之石","風靈之靴","海洋女神的項鍊","黃昏之書","黎明之星"
        ],
        '4star': [
            "精靈短劍","騎士鎧甲","月光手環","獵人長弓","巫師帽","符文石","銀製護符","影狼之爪","聖光權杖","龍鱗盾",
            "疾風戒指","冰晶吊墜","火焰寶珠","自然之杖","暗殺者匕首","聖騎士頭盔","妖精之翼","雷鳴戰斧","水神之淚","大地之鎚",
            "幻影面具","幸運硬幣","咒術卷軸","鋼鐵護腿","毒蛇之牙","鳳凰之淚","靈魂燈籠","黃金羅盤","祕法水晶","暗夜披風",
            "龍骨弓","聖女之杖","狂戰士護腕","幻獸哨子","魔導書","銀月彎刀","荊棘鞭","寒冰手套","火焰披風","雷電護符",
            "暗影之靴","光輝頭冠","獸人戰斧","精靈豎琴","祕銀甲","詛咒之戒","時光沙漏","星塵粉末","龍牙匕首","聖徽吊墜"
        ],
        '3star': [
            "木劍","皮甲","布帽","銅盾","短弓","鐵匕首","草藥包","火把","水壺","繩索",
            "指南針","地圖碎片","銅幣袋","鐵礦石","木盾","皮靴","羊毛斗篷","魚竿","捕獸夾","磨刀石",
            "蠟燭","筆記本","羽毛筆","墨水","釀酒桶","麵包","乾糧","藥水（小）","繃帶","火絨盒",
            "鈴鐺","鏡子（小）","梳子","口琴","骰子（普通）","撲克牌","小刀","鏟子","十字鎬","漁網",
            "陷阱","籠子","繩梯","燈油","雨衣","手套","圍巾","帽子","腰包","背包",
            "水袋","乾肉","果乾","堅果","糖","鹽","胡椒","香料","茶杯","碗",
            "木湯匙","鐵鍋","烤肉架","打火石","蠟封","信紙","信封","圖釘","釘子","鐵絲",
            "木板","布料","皮革碎片","骨頭","牙齒","羽毛","貝殼","珊瑚","琥珀","水晶碎片",
            "玻璃珠","陶瓷碎片","黏土","沙袋","磨石","刷子","掃帚","抹布","水桶","花盆",
            "種子","肥料","澆水壺","捕蟲網","標本瓶","放大鏡","溫度計","風向標","日晷","星圖"
        ],
        '2star': [
            "斷掉的木劍","發霉的麵包","缺角的碗","生鏽的鐵釘","破洞的襪子","用過的繃帶","髒抹布","沒水的筆","撕一半的紙","扁掉的皮球",
            "斷弦的吉他","掉漆的鈴鐺","裂開的鏡子（真的會倒楣那種）","少一顆的棋子","缺頁的書","卡住的時鐘","沒電的電池","褪色的布條","歪掉的湯匙","燒焦的鍋子",
            "軟掉的蠟燭","打不開的鎖頭","沒鑰匙的鑰匙圈","斷掉的鞋帶","磨平的硬幣","空瓶子（有灰塵）","黏在一起的紙牌","少輪子的玩具車","沒磁力的磁鐵","斷掉的橡皮筋",
            "破掉的氣球","濕掉的火柴","沒氣的哨子","彎掉的吸管","少一頁的日曆","褪色的貼紙","斷掉的梳子","缺牙的叉子","生鏽的剪刀","卡住的拉鍊頭",
            "破掉的漁網（補不起來）","沒水的墨水罐","乾掉的膠水","破掉的燈籠","歪掉的釘書機","沒釘書針的釘書機","斷掉的錶帶","磨損的橡皮擦","少一截的鉛筆","髒掉的棉花棒",
            "破掉的扇子","缺腳的桌子（模型）","掉漆的棋子","斷掉的釣竿","空的飼料袋","褪色的旗幟","破掉的帳篷布","少螺絲的眼鏡","歪掉的衣架","斷掉的項鍊",
            "掉鑽的戒指","褪色的手環","破掉的書包","缺輪的滑板","斷掉的球拍","沒彈性的彈簧","破掉的沙包","褪色的彩帶","斷掉的螢光棒","乾掉的指甲油",
            "破掉的鏡子碎片（裝袋）","少一耳的杯子","歪掉的湯碗","裂開的盤子","掉漆的湯匙","缺牙的梳子","斷掉的髮圈","褪色的髮夾","生鏽的別針","破掉的徽章",
            "少一塊的拼圖","斷掉的尺","磨損的三角板","缺角的量角器","斷掉的圓規","沒水的白板筆","乾掉的印章","褪色的印泥","破掉的資料夾","少一頁的筆記本",
            "斷掉的書籤","褪色的名牌","破掉的識別證套","生鏽的夾子","斷掉的曬衣夾","褪色的繩子","起毛球的圍巾","破掉的手套（一隻）","缺鈕扣的外套","斷掉的拉鍊"
        ],
        '1star': ['$1','$2']  // 特殊
    };

    // 建立星星映射
    const starMapping = {};
    Object.keys(itemDB).forEach(star => {
        itemDB[star].forEach(name => { starMapping[name] = star; });
    });
    // 手動補1星
    starMapping['$1'] = '1star';
    starMapping['$2'] = '1star';
    // 所有物品清單
    state.allItems = Object.values(itemDB).flat();

    // 機率設定
    function drawRarity() {
        const r = Math.random();
        if (r < 0.0001) return '5star'; // 0.01% 但顯示0.001%? 調整0.0001=0.01% 符合描述
        if (r < 0.0501) return '4star';
        if (r < 0.3001) return '3star';
        if (r < 0.9001) return '2star';
        return '1star';
    }

    function drawItem(rarity) {
        const pool = itemDB[rarity] || ['$1'];
        return pool[Math.floor(Math.random() * pool.length)];
    }

    // 一次扭蛋
    function performGacha(amount = 1) {
        let results = [];
        for (let i=0; i<amount; i++) {
            if (state.coins < 1) break;
            state.coins -= 1;
            const rarity = drawRarity();
            const item = drawItem(rarity);
            // 記錄
            if (!state.collection[item]) state.collection[item] = 0;
            state.collection[item] += 1;
            state.inventory.push(item);
            results.push({ item, rarity });
        }
        updateUI();
        // 顯示最後一個 (動畫)
        if (results.length > 0) {
            const last = results[results.length-1];
            showGachaResult(last.item, last.rarity, results.length);
        } else {
            document.getElementById('gachaResult').innerHTML = '💰 金幣不足';
        }
        // 更新收藏數量
        updateCollectionCount();
        return results;
    }

    // 展示動畫 (含3D/2.5D)
    function showGachaResult(item, rarity, total) {
        const container = document.getElementById('gachaResult');
        const is5 = rarity === '5star';
        const is4 = rarity === '4star';
        let displayName = item;
        if (item === '$1') displayName = '💰 +1 金幣';
        else if (item === '$2') displayName = '💰 +2 金幣';

        let html = `<div style="font-size:${is5?'26px':'20px'}; font-weight:700;">`;
        if (is5) {
            html += `<span class="star5">⭐️⭐️⭐️⭐️⭐️</span><br>✨ ${displayName} ✨`;
        } else if (is4) {
            html += `⭐️⭐️⭐️⭐️<br>🌟 ${displayName}`;
        } else if (rarity === '3star') {
            html += `⭐️⭐️⭐️<br>${displayName}`;
        } else if (rarity === '2star') {
            html += `⭐️⭐️<br>${displayName}`;
        } else {
            html += `⭐️<br>${displayName}`;
        }
        html += `</div>`;
        container.innerHTML = html;

        // 針對5星 顯示3D 模型 (用Three.js)
        const gacha3D = document.getElementById('gacha3DContainer');
        if (is5 || is4) {
            gacha3D.classList.remove('hidden');
            // 簡單建立3D 物體 (根據物品不同顏色)
            build3DModel(item, rarity, gacha3D);
        } else {
            gacha3D.classList.add('hidden');
        }
    }

    // 簡易3D 建模 (每個五星/四星獨特顏色/形狀)
    function build3DModel(item, rarity, container) {
        // 清除舊
        while (container.firstChild) container.removeChild(container.firstChild);
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 100);
        camera.position.set(2, 2, 5);
        camera.lookAt(0,0,0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setClearColor(0x121624, 0);
        container.appendChild(renderer.domElement);

        // 燈光
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(1, 3, 2);
        scene.add(dirLight);
        const backLight = new THREE.DirectionalLight(0x446688, 0.5);
        backLight.position.set(-1, 0, -2);
        scene.add(backLight);

        // 根據物品產生獨特顏色
        let hue = (item.length * 7) % 360 / 360;
        let color = new THREE.Color().setHSL(hue, 0.8, 0.6);
        // 五星金色調
        if (rarity === '5star') color = new THREE.Color(0xffaa33);

        const geometry = new THREE.BoxGeometry(1.2, 1.2, 1.2);
        const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.7, emissive: new THREE.Color(0x221100) });
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // 旋轉動畫
        function animate() {
            requestAnimationFrame(animate);
            mesh.rotation.x += 0.008;
            mesh.rotation.y += 0.02;
            renderer.render(scene, camera);
        }
        animate();

        // 手指互動 (OrbitControls)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.autoRotate = false;
        controls.target.set(0,0,0);
        controls.update();

        // resize
        window.addEventListener('resize', ()=>{
            const w = container.clientWidth;
            const h = container.clientHeight;
            renderer.setSize(w,h);
            camera.aspect = w/h;
            camera.updateProjectionMatrix();
        });
    }

    // ---------- UI 更新 ----------
    function updateUI() {
        document.getElementById('coinCount').innerText = state.coins;
        document.getElementById('nicknameDisplay').innerText = state.nickname;
        document.getElementById('avatarDisplay').innerText = state.nickname.charAt(0).toUpperCase();
    }

    function updateCollectionCount() {
        const total = Object.values(state.collection).reduce((a,b)=>a+b,0);
        document.getElementById('collectionCount').innerText = `共 ${total} 件`;
        renderCollection();
    }

    // 收藏品渲染
    function renderCollection() {
        const grid = document.getElementById('collectionGrid');
        grid.innerHTML = '';
        // 依照星級排序: 5,4,3,2,1
        const order = ['5star','4star','3star','2star','1star'];
        let allKeys = new Set(state.allItems);
        // 顯示所有物品 (未知用?)
        const allItemNames = state.allItems;
        const owned = new Set(Object.keys(state.collection));

        allItemNames.forEach(name => {
            const div = document.createElement('div');
            div.className = 'collect-item';
            const count = state.collection[name] || 0;
            if (count === 0) {
                div.classList.add('unknown');
                div.innerHTML = `<div style="font-size:28px;">❓</div><div>?</div>`;
            } else {
                const star = starMapping[name] || '1star';
                let starStr = '';
                if (star === '5star') starStr = '⭐️⭐️⭐️⭐️⭐️';
                else if (star === '4star') starStr = '⭐️⭐️⭐️⭐️';
                else if (star === '3star') starStr = '⭐️⭐️⭐️';
                else if (star === '2star') starStr = '⭐️⭐️';
                else starStr = '⭐️';
                let displayName = name;
                if (name === '$1') displayName = '💰+1';
                else if (name === '$2') displayName = '💰+2';
                div.innerHTML = `
                    <div class="rarity-star">${starStr}</div>
                    <div class="item-name">${displayName}</div>
                    ${count>1 ? `<div class="duplicate-badge">×${count}</div>` : ''}
                `;
                // 如果有3D預覽 (五星四星) 但簡化用顏色表示
                if (star === '5star' || star === '4star') {
                    const preview = document.createElement('div');
                    preview.className = 'item-3d-preview';
                    preview.style.background = `hsl(${(name.length*37)%360}, 70%, 40%)`;
                    div.prepend(preview);
                }
            }
            grid.appendChild(div);
        });
    }

    // 切換收藏/主頁
    function showMain(show) {
        document.getElementById('mainView').style.display = show ? 'flex' : 'none';
        document.getElementById('collectionView').style.display = show ? 'none' : 'flex';
        if (!show) updateCollectionCount();
    }

    // ---------- 登入 ----------
    function login(nick) {
        state.loggedIn = true;
        state.nickname = nick || '冒險者';
        document.getElementById('loginOverlay').classList.add('hidden');
        updateUI();
        updateCollectionCount();
        showMain(true);
    }

    document.getElementById('googleLoginBtn').addEventListener('click', ()=>{
        // 模擬Google登入
        const name = prompt('輸入Google暱稱', '旅行者');
        if (name) login(name);
        else login('Google玩家');
    });
    document.getElementById('guestLoginBtn').addEventListener('click', ()=>{
        const nick = document.getElementById('nicknameInput').value.trim() || '冒險者';
        login(nick);
    });

    // 更改暱稱 (點頭像)
    document.getElementById('profileArea').addEventListener('click', ()=>{
        if (!state.loggedIn) return;
        const newName = prompt('更改暱稱', state.nickname);
        if (newName) {
            state.nickname = newName;
            updateUI();
        }
    });

    // 收藏切換
    document.getElementById('collectionToggle').addEventListener('click', ()=>{
        if (!state.loggedIn) return;
        const showingMain = document.getElementById('mainView').style.display !== 'none';
        showMain(!showingMain);
    });
    document.getElementById('backToMain').addEventListener('click', ()=>{
        showMain(true);
    });

    // 扭蛋事件
    document.getElementById('gacha1Btn').addEventListener('click', ()=>{ if(state.loggedIn) performGacha(1); });
    document.getElementById('gacha10Btn').addEventListener('click', ()=>{ if(state.loggedIn) performGacha(10); });
    document.getElementById('gacha100Btn').addEventListener('click', ()=>{ if(state.loggedIn) performGacha(100); });

    // 點擊機器
    document.getElementById('clickerBtn').addEventListener('click', ()=>{
        if (!state.loggedIn) return;
        state.coins += 1;
        updateUI();
    });

    // 初始給予10元
    state.coins = 10;
    updateUI();
    // 預設顯示主頁 (登入後)
    showMain(true);
    // 初始化收藏
    updateCollectionCount();

    // 當 4星/5星 需要互動，已加 OrbitControls
    console.log('🌟 星願扭蛋機 啟動！');
</script>
