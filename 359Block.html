<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>預知未來 · 自定義背景</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #0b0b0b;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
        }

        .container {
            background-color: #0b0b0b;
            padding: 24px 24px 20px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 820px;
            width: fit-content;
            margin: 0 auto;
        }

        .grid-wrapper {
            position: relative;
            background-color: #1a1a1a;
            border-radius: 24px;
            padding: 8px;
            box-shadow: inset 0 0 0 1px #2a2a2a;
        }

        .grid {
            display: grid;
            gap: 8px;
            width: fit-content;
            margin: 0 auto;
            border-radius: 18px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.2s ease;
            position: relative;
            z-index: 1;
        }

        .grid.bg-mode .cell {
            background-color: rgba(40, 40, 40, 0.5);
            backdrop-filter: blur(2px);
            border: 2px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
        }

        .grid.bg-mode .cell.active {
            background-color: #ffffff;
            box-shadow: 0 0 24px rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .grid.bg-mode .cell.preview {
            background-color: rgba(20, 20, 20, 0.75);
            border: 3px dashed #b0b0b0;
            box-shadow: 0 0 12px rgba(160, 160, 160, 0.25);
        }

        .cell {
            aspect-ratio: 1 / 1;
            background-color: #6b6b6b;
            border-radius: 16px;
            transition: background-color 0.12s ease, transform 0.1s ease, border 0.12s ease, box-shadow 0.12s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
            cursor: pointer;
            will-change: transform;
            width: 100%;
            height: auto;
            min-width: 36px;
            min-height: 36px;
            border: 3px solid transparent;
        }

        .grid.size-3 .cell {
            width: 90px;
            height: 90px;
        }
        .grid.size-5 .cell {
            width: 80px;
            height: 80px;
        }
        .grid.size-9 .cell {
            width: 56px;
            height: 56px;
        }

        .cell.active {
            background-color: #ffffff;
            box-shadow: 0 0 18px rgba(255, 255, 255, 0.6);
            border-color: transparent;
        }

        .cell.preview {
            background-color: #4a4a4a;
            border: 3px dashed #8a8a8a;
            box-shadow: 0 0 10px rgba(100, 100, 100, 0.3);
        }

        .cell:hover {
            transform: scale(0.96);
            filter: brightness(1.1);
        }

        .cell.active:hover {
            filter: brightness(1.0);
            transform: scale(0.96);
        }

        .cell.preview:hover {
            filter: brightness(1.05);
            transform: scale(0.96);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px 18px;
            margin-top: 20px;
            color: #c0c0c0;
            font-size: 0.9rem;
            width: 100%;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #181818;
            padding: 6px 14px 6px 12px;
            border-radius: 40px;
            border: 1px solid #2a2a2a;
        }

        .control-group label {
            cursor: pointer;
            user-select: none;
            color: #aaa;
            white-space: nowrap;
        }

        .control-group select,
        .control-group input[type="file"] {
            background: #252525;
            border: 1px solid #3a3a3a;
            color: #eee;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            transition: border 0.15s;
            max-width: 140px;
        }

        .control-group select:hover,
        .control-group input[type="file"]:hover {
            border-color: #6a6a6a;
        }

        .control-group select:focus {
            border-color: #9a9a9a;
        }

        .file-label {
            background: #252525;
            padding: 5px 14px;
            border-radius: 30px;
            border: 1px solid #3a3a3a;
            color: #ccc;
            cursor: pointer;
            font-size: 0.85rem;
            transition: border 0.15s;
            white-space: nowrap;
        }

        .file-label:hover {
            border-color: #6a6a6a;
        }

        .file-label input {
            display: none;
        }

        .btn-reset-bg {
            background: #252525;
            border: 1px solid #3a3a3a;
            color: #ccc;
            padding: 5px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: border 0.15s;
        }

        .btn-reset-bg:hover {
            border-color: #6a6a6a;
        }

        @media (max-width: 640px) {
            .grid.size-3 .cell { width: 70px; height: 70px; }
            .grid.size-5 .cell { width: 60px; height: 60px; }
            .grid.size-9 .cell { width: 42px; height: 42px; }
            .controls { gap: 10px; }
            .control-group { padding: 4px 10px; }
        }

        @media (max-width: 480px) {
            .grid.size-3 .cell { width: 56px; height: 56px; }
            .grid.size-5 .cell { width: 46px; height: 46px; }
            .grid.size-9 .cell { width: 32px; height: 32px; }
            .container { padding: 16px 10px; }
            .grid { gap: 5px; padding: 5px; }
            .control-group select { font-size: 0.75rem; padding: 4px 8px; }
            .file-label { font-size: 0.75rem; padding: 4px 10px; }
            .btn-reset-bg { font-size: 0.75rem; padding: 4px 10px; }
        }

        @media (max-width: 380px) {
            .grid.size-9 .cell { width: 26px; height: 26px; }
            .grid.size-5 .cell { width: 38px; height: 38px; }
            .grid.size-3 .cell { width: 46px; height: 46px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="grid-wrapper">
            <div class="grid size-5" id="gridContainer"></div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="sizeSelect">尺寸</label>
                <select id="sizeSelect">
                    <option value="3">3x3</option>
                    <option value="5" selected>5x5</option>
                    <option value="9">9x9</option>
                </select>
            </div>

            <div class="control-group">
                <label for="previewCount">預知</label>
                <select id="previewCount">
                    <option value="1" selected>1個</option>
                    <option value="2">2個</option>
                    <option value="3">3個</option>
                </select>
            </div>

            <div class="control-group">
                <label class="file-label">
                    📷 背景
                    <input type="file" id="bgUpload" accept="image/*">
                </label>
                <button class="btn-reset-bg" id="resetBgBtn">✕ 清除</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ----- 配置 -----
            let currentSize = 5;
            let previewCount = 1;
            let cells = [];
            let currentIndex = -1;
            let previewIndices = [];
            let isWaitingForClick = false;
            let isUpdating = false;
            let bgImageUrl = null;

            // ✅ 預設背景圖片
            const DEFAULT_BG = 'https://cdn.donmai.us/sample/81/8e/__original_drawn_by_marse_rokudaime__sample-818e3624e56c23daadec223d9af63376.jpg';

            const gridContainer = document.getElementById('gridContainer');
            const sizeSelect = document.getElementById('sizeSelect');
            const previewSelect = document.getElementById('previewCount');
            const bgUpload = document.getElementById('bgUpload');
            const resetBgBtn = document.getElementById('resetBgBtn');

            // ----- 輔助函式 -----
            function clearAllStates() {
                const size = currentSize;
                for (let r = 0; r < size; r++) {
                    for (let c = 0; c < size; c++) {
                        const cell = cells[r]?.[c];
                        if (cell) {
                            cell.classList.remove('active', 'preview');
                        }
                    }
                }
                currentIndex = -1;
                previewIndices = [];
            }

            function setCellState(index, state) {
                if (index < 0) return;
                const size = currentSize;
                const row = Math.floor(index / size);
                const col = index % size;
                const cell = cells[row]?.[col];
                if (!cell) return;
                cell.classList.remove('active', 'preview');
                if (state === 'active') {
                    cell.classList.add('active');
                } else if (state === 'preview') {
                    cell.classList.add('preview');
                }
            }

            function generateRandomIndices(count) {
                const total = currentSize * currentSize;
                if (total < count) return [];
                const indices = [];
                const pool = Array.from({ length: total }, (_, i) => i);
                for (let i = 0; i < count; i++) {
                    const randIdx = Math.floor(Math.random() * pool.length);
                    indices.push(pool[randIdx]);
                    pool.splice(randIdx, 1);
                }
                return indices;
            }

            function setupCycle() {
                clearAllStates();
                const totalNeeded = 1 + previewCount;
                const indices = generateRandomIndices(totalNeeded);
                if (indices.length < totalNeeded) {
                    return;
                }
                currentIndex = indices[0];
                previewIndices = indices.slice(1);

                setCellState(currentIndex, 'active');
                previewIndices.forEach(idx => setCellState(idx, 'preview'));

                isWaitingForClick = true;
            }

            function advanceCycle() {
                setCellState(currentIndex, 'gray');

                if (previewIndices.length === 0) {
                    setupCycle();
                    return;
                }

                const newCurrent = previewIndices[0];
                setCellState(newCurrent, 'active');
                currentIndex = newCurrent;

                previewIndices.shift();

                const total = currentSize * currentSize;
                const usedSet = new Set([currentIndex, ...previewIndices]);
                while (previewIndices.length < previewCount) {
                    let candidate = Math.floor(Math.random() * total);
                    if (!usedSet.has(candidate)) {
                        previewIndices.push(candidate);
                        usedSet.add(candidate);
                        setCellState(candidate, 'preview');
                    }
                }

                previewIndices.forEach(idx => setCellState(idx, 'preview'));

                isWaitingForClick = true;
            }

            // ----- 點擊處理 -----
            function handleGridClick(e) {
                const cell = e.target.closest('.cell');
                if (!cell) return;
                if (!isWaitingForClick || currentIndex === -1 || isUpdating) return;

                const row = parseInt(cell.dataset.row, 10);
                const col = parseInt(cell.dataset.col, 10);
                if (isNaN(row) || isNaN(col)) return;

                const size = currentSize;
                const clickedIndex = row * size + col;

                if (clickedIndex !== currentIndex) {
                    return;
                }

                isWaitingForClick = false;
                advanceCycle();
            }

            // ----- 背景圖片處理 -----
            function applyBackgroundImage(url) {
                bgImageUrl = url;
                if (url) {
                    gridContainer.classList.add('bg-mode');
                    gridContainer.style.backgroundImage = `url(${url})`;
                } else {
                    gridContainer.classList.remove('bg-mode');
                    gridContainer.style.backgroundImage = 'none';
                }
            }

            function handleBgUpload(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    applyBackgroundImage(ev.target.result);
                };
                reader.readAsDataURL(file);
                bgUpload.value = '';
            }

            function resetBackground() {
                applyBackgroundImage(null);
            }

            // ----- 重建網格 -----
            function buildGrid(size) {
                isUpdating = true;

                gridContainer.innerHTML = '';
                cells = [];
                currentIndex = -1;
                previewIndices = [];
                isWaitingForClick = false;

                currentSize = size;
                gridContainer.className = 'grid';
                gridContainer.classList.add(`size-${size}`);
                gridContainer.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

                if (bgImageUrl) {
                    gridContainer.classList.add('bg-mode');
                    gridContainer.style.backgroundImage = `url(${bgImageUrl})`;
                } else {
                    gridContainer.classList.remove('bg-mode');
                    gridContainer.style.backgroundImage = 'none';
                }

                for (let r = 0; r < size; r++) {
                    const rowCells = [];
                    for (let c = 0; c < size; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.row = r;
                        cell.dataset.col = c;
                        gridContainer.appendChild(cell);
                        rowCells.push(cell);
                    }
                    cells.push(rowCells);
                }

                isUpdating = false;

                setTimeout(() => {
                    if (!isUpdating) {
                        setupCycle();
                    }
                }, 60);
            }

            // ----- 尺寸 / 預知數量切換 -----
            function onSizeChange(e) {
                if (isUpdating) return;
                const newSize = parseInt(e.target.value, 10);
                if (newSize === currentSize) {
                    buildGrid(newSize);
                    return;
                }
                buildGrid(newSize);
            }

            function onPreviewCountChange(e) {
                if (isUpdating) return;
                const newCount = parseInt(e.target.value, 10);
                if (newCount === previewCount) {
                    setupCycle();
                    return;
                }
                previewCount = newCount;
                setupCycle();
            }

            // ----- 初始化 -----
            function init() {
                gridContainer.addEventListener('click', handleGridClick);
                sizeSelect.addEventListener('change', onSizeChange);
                previewSelect.addEventListener('change', onPreviewCountChange);
                bgUpload.addEventListener('change', handleBgUpload);
                resetBgBtn.addEventListener('click', resetBackground);

                // ✅ 套用預設背景
                applyBackgroundImage(DEFAULT_BG);

                currentSize = 5;
                previewCount = 1;
                sizeSelect.value = '5';
                previewSelect.value = '1';
                buildGrid(5);
            }

            init();
        })();
    </script>

</body>
</html>
